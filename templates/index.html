<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        h3 {
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Student Performance Predictor</h1>

        <form action="/predict" method="post">

            <input type="number" step="any"
                   name="hours_studied"
                   placeholder="Hours Studied"
                   required>

            <input type="number" step="any"
                   name="previous_scores"
                   placeholder="Previous Scores"
                   required>

            <input type="number" step="any"
                   name="sleep_hours"
                   placeholder="Sleep Hours"
                   required>

            <input type="number" step="any"
                   name="sample_papers"
                   placeholder="Sample Question Papers Practiced"
                   required>

            <br><br>

            <button type="submit">
                Predict
            </button>

        </form>

        <br>

        <h3>{{ prediction_text }}</h3>

    </div>

</body>
</html>
